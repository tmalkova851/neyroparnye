<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НЕЙРОПАРНИ — Студия уникального контента</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 22px 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .contacts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .contacts-label {
      font-family: 'Raleway', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
    }

    .contacts-icons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .contact-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      transition: transform 0.2s, opacity 0.2s;
      cursor: pointer;
      text-decoration: none;
    }

    .contact-icon:hover {
      transform: scale(1.1);
      opacity: 0.85;
    }

    .contact-icon svg { width: 48px; height: 48px; }

    /* HERO */
    .hero {
      padding: 0px 48px 0px;
      margin-top: -10px;
      margin-bottom: -24px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-logo {
      max-width: clamp(260px, 40vw, 520px);
      width: 100%;
      margin-bottom: 0;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .hero p {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(12px, 1.4vw, 16px);
      font-weight: 200;
      color: #888;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    /* STRIP SECTION */
    .strip-section {
      padding: 0 0 32px;
      overflow: hidden;
      transform: perspective(2000px) rotateX(14deg) skewX(-8deg);
      transform-origin: center top;
    }

    .strip-wrapper {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .strip {
      display: flex;
      gap: 10px;
      width: max-content;
    }

    .strip-1 { animation: slide-left 40s linear infinite; }
    .strip-2 { animation: slide-right 44s linear infinite; }

    .strip:hover { animation-play-state: paused; }

    @keyframes slide-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes slide-right {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .video-card {
      height: 200px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }

    .video-card:hover {
      transform: scale(1.05) translateY(-6px);
      box-shadow: 0 20px 50px rgba(229,9,20,0.35);
      z-index: 10;
    }

    .video-card img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
    }

    .video-card:hover .play-overlay { background: rgba(0,0,0,0.4); }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(229,9,20,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.3s, transform 0.3s;
    }

    .video-card:hover .play-btn {
      opacity: 1;
      transform: scale(1);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.94);
      align-items: center;
      justify-content: center;
    }

    .modal.active { display: flex; }

    .modal-inner {
      position: relative;
      max-width: 92vw;
      max-height: 88vh;
    }

    .modal-inner video {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 8px;
      background: #000;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: -42px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .modal-close:hover { opacity: 1; }

    @media (max-width: 768px) {
      header {
        padding: 8px 16px;
      }

      .contact-icon,
      .contact-icon svg {
        width: 34px;
        height: 34px;
      }

      .hero {
        margin-top: -6px;
        margin-bottom: -8px;
        padding: 0 16px 0;
      }

      .hero-logo {
        max-width: 55vw;
      }

      .strip-wrapper {
        transform: perspective(800px) rotateX(8deg) rotateY(-3deg);
        gap: 6px;
      }

      .video-card {
        height: 155px;
      }

      .strip-section {
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="contacts">
      <span class="contacts-label">Контакты</span>
      <div class="contacts-icons">

        <!-- Telegram — современная иконка с закруглёнными углами -->
        <a class="contact-icon" href="https://t.me/d_malkov" target="_blank" title="Telegram">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#tg-grad)"/>
            <defs>
              <linearGradient id="tg-grad" x1="24" y1="0" x2="24" y2="48" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#2AABEE"/>
                <stop offset="100%" stop-color="#229ED9"/>
              </linearGradient>
            </defs>
            <path d="M10.5 23.5l5.8 2.2 2.2 7 3-3.8 6.2 4.6 5.3-17.5-22.5 7.5z" fill="white" opacity="0.5"/>
            <path d="M16.3 25.7l-.8 7 3-3.8 6.2 4.6 5.3-17.5-22.5 7.5 8.8 2.2z" fill="white"/>
            <path d="M16.3 25.7l-.5 4.2 2.7-3.4-2.2-.8z" fill="#d0e8f5"/>
          </svg>
        </a>

        <!-- MAX — настоящий логотип -->
        <a class="contact-icon" href="https://max.ru/+79092566969" target="_blank" title="MAX Messenger">
          <img src="max-logo.png" style="width:48px;height:48px;object-fit:contain;border-radius:12px;">
        </a>

      </div>
    </div>
  </header>

  <section class="hero">
    <img class="hero-logo" src="logo.png" alt="Нейропарни">
  </section>

  <section class="strip-section">
    <div class="strip-wrapper">
      <div class="strip strip-1" id="strip1"></div>
      <div class="strip strip-2" id="strip2"></div>
    </div>
  </section>

  <div class="modal" id="modal">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose">✕</button>
      <video id="modalVideo" controls></video>
    </div>
  </div>

  <script>
    const videos = [
      'videos/video1.mp4',
      'videos/video2.mp4',
      'videos/video3.mp4',
      'videos/video4.mp4',
      'videos/video5.mp4',
      'videos/video6.mp4',
      'videos/video7.mp4',
      'videos/video8.mp4',
      'videos/video9.mp4',
      'videos/video10.mp4',
    ];

    const strip1 = document.getElementById('strip1');
    const strip2 = document.getElementById('strip2');

    function makeCard(src, i) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <img src="thumbs/thumb${i+1}.jpg" alt="">
        <div class="play-overlay">
          <div class="play-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openModal(src));
      return card;
    }

    // Ряд 1: все видео, дублируем для бесшовной прокрутки
    videos.forEach((src, i) => strip1.appendChild(makeCard(src, i)));
    videos.forEach((src, i) => strip1.appendChild(makeCard(src, i)));

    // Ряд 2: те же видео в обратном порядке
    const reversed = [...videos].reverse();
    reversed.forEach((src, i) => strip2.appendChild(makeCard(src, videos.length - 1 - i)));
    reversed.forEach((src, i) => strip2.appendChild(makeCard(src, videos.length - 1 - i)));

    const modal = document.getElementById('modal');
    const modalVideo = document.getElementById('modalVideo');
    const modalClose = document.getElementById('modalClose');

    function openModal(src) {
      modalVideo.src = src;
      modal.classList.add('active');
      modalVideo.play();
    }

    function closeModal() {
      modal.classList.remove('active');
      modalVideo.pause();
      modalVideo.src = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
