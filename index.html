<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НЕЙРОПАРНИ — ИИ-контент, который продаёт</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #e50914;
      text-transform: uppercase;
    }

    .contacts {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .contact-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
    }

    .contact-icon:hover {
      background: rgba(229,9,20,0.3);
      transform: scale(1.1);
    }

    .contact-icon svg { width: 24px; height: 24px; }

    /* HERO */
    .hero {
      padding: 160px 48px 60px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero h1 span { color: #e50914; }

    .hero p {
      font-size: clamp(16px, 2vw, 22px);
      color: #aaa;
      letter-spacing: 1px;
    }

    /* STRIP SECTION */
    .strip-section {
      padding: 40px 0 100px;
      overflow: hidden;
    }

    .strip-wrapper {
      transform: perspective(1400px) rotateX(12deg) rotateY(-6deg);
      transform-origin: center top;
      padding: 20px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .strip {
      display: flex;
      gap: 10px;
      width: max-content;
    }

    .strip-1 { animation: slide-left 40s linear infinite; }
    .strip-2 { animation: slide-right 44s linear infinite; }

    .strip:hover { animation-play-state: paused; }

    @keyframes slide-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes slide-right {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .video-card {
      height: 340px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }

    .video-card:hover {
      transform: scale(1.05) translateY(-6px);
      box-shadow: 0 20px 50px rgba(229,9,20,0.35);
      z-index: 10;
    }

    .video-card img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
    }

    .video-card:hover .play-overlay { background: rgba(0,0,0,0.4); }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(229,9,20,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.3s, transform 0.3s;
    }

    .video-card:hover .play-btn {
      opacity: 1;
      transform: scale(1);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.94);
      align-items: center;
      justify-content: center;
    }

    .modal.active { display: flex; }

    .modal-inner {
      position: relative;
      max-width: 92vw;
      max-height: 88vh;
    }

    .modal-inner video {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 8px;
      background: #000;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: -42px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .modal-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Нейропарни</div>
    <div class="contacts">
      <a class="contact-icon" href="https://t.me/d_malkov" target="_blank" title="Telegram">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.79l-1.68 7.93c-.12.56-.46.7-.93.43l-2.57-1.89-1.24 1.19c-.14.14-.25.25-.51.25l.18-2.6 4.72-4.27c.2-.18-.05-.28-.32-.1L8.12 14.4l-2.52-.79c-.55-.17-.56-.55.11-.81l9.84-3.8c.46-.17.86.11.71.79h-.01z" fill="#2AABEE"/>
        </svg>
      </a>
      <a class="contact-icon" href="https://max.ru/+79092566969" target="_blank" title="MAX Messenger">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="6" fill="#0077FF"/>
          <text x="12" y="17" text-anchor="middle" font-size="11" font-weight="900" font-family="Arial" fill="#fff">MAX</text>
        </svg>
      </a>
    </div>
  </header>

  <section class="hero">
    <h1>Нейро<span>парни</span></h1>
    <p>ИИ-контент, который продаёт</p>
  </section>

  <section class="strip-section">
    <div class="strip-wrapper">
      <div class="strip strip-1" id="strip1"></div>
      <div class="strip strip-2" id="strip2"></div>
    </div>
  </section>

  <div class="modal" id="modal">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose">✕</button>
      <video id="modalVideo" controls></video>
    </div>
  </div>

  <script>
    const videos = [
      'videos/video1.mp4',
      'videos/video2.mp4',
      'videos/video3.mp4',
      'videos/video4.mp4',
      'videos/video5.mp4',
      'videos/video6.mp4',
      'videos/video7.mp4',
      'videos/video8.mp4',
      'videos/video9.mp4',
      'videos/video10.mp4',
    ];

    const strip1 = document.getElementById('strip1');
    const strip2 = document.getElementById('strip2');

    function makeCard(src, i) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <img src="thumbs/thumb${i+1}.jpg" alt="">
        <div class="play-overlay">
          <div class="play-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openModal(src));
      return card;
    }

    // Ряд 1: все видео, дублируем для бесшовной прокрутки
    videos.forEach((src, i) => strip1.appendChild(makeCard(src, i)));
    videos.forEach((src, i) => strip1.appendChild(makeCard(src, i)));

    // Ряд 2: те же видео в обратном порядке
    const reversed = [...videos].reverse();
    reversed.forEach((src, i) => strip2.appendChild(makeCard(src, videos.length - 1 - i)));
    reversed.forEach((src, i) => strip2.appendChild(makeCard(src, videos.length - 1 - i)));

    const modal = document.getElementById('modal');
    const modalVideo = document.getElementById('modalVideo');
    const modalClose = document.getElementById('modalClose');

    function openModal(src) {
      modalVideo.src = src;
      modal.classList.add('active');
      modalVideo.play();
    }

    function closeModal() {
      modal.classList.remove('active');
      modalVideo.pause();
      modalVideo.src = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
